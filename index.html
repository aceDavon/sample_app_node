<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample App</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #0f172a;
        color: #f1f5f9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      .card {
        text-align: center;
        padding: 3rem 4rem;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 1rem;
        max-width: 480px;
        width: 90%;
      }

      .badge {
        display: inline-block;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #38bdf8;
        background: rgba(56, 189, 248, 0.1);
        border: 1px solid rgba(56, 189, 248, 0.25);
        border-radius: 9999px;
        padding: 0.25rem 0.875rem;
        margin-bottom: 1.5rem;
      }

      h1 {
        font-size: 2rem;
        font-weight: 700;
        line-height: 1.2;
        margin-bottom: 1rem;
        color: #f8fafc;
      }

      p {
        font-size: 1rem;
        line-height: 1.7;
        color: #94a3b8;
      }

      .dot {
        display: inline-block;
        width: 0.5rem;
        height: 0.5rem;
        background: #22c55e;
        border-radius: 50%;
        margin-right: 0.4rem;
        vertical-align: middle;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      .status {
        margin-top: 2rem;
        font-size: 0.875rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">Hosted Service</div>
      <h1>Hello, World.</h1>
      <p>This is a static web app deployed to demonstrate hosting a service on the web.</p>
      <p class="status"><span class="dot"></span>Service is running</p>
    </div>
  </body>
</html>
